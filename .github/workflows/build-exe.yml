name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install playwright==1.58.0 pyinstaller

      - name: Collect Playwright data for PyInstaller
        run: |
          pip show playwright

      - name: Build EXE
        run: |
          pyinstaller `
            --onefile `
            --name mms_autosolver `
            --console `
            --collect-all playwright `
            mms_autosolver.py

      - name: Upload EXE as artifact
        uses: actions/upload-artifact@v4
        with:
          name: mms-autosolver-windows
          path: dist/mms_autosolver.exe
          retention-days: 30
