name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install playwright==1.58.0 pyinstaller

      - name: Build EXE
        run: |
          pyinstaller `
            --onefile `
            --name mms_autosolver `
            --console `
            --collect-all playwright `
            mms_autosolver.py

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "MMS Auto-Solver — Latest Build"
          body: |
            ## MMS Málið í Mark — Auto-Solver

            **Download `mms_autosolver.exe` below and double-click to run.**

            On first launch it will download Chromium (~150 MB) automatically.
            After that it opens a browser and solves all exercises.

            ### Sections
            - `1` — Fallorð (67 exercises)
            - `2` — Sagnorð (79 exercises)
            - `3` — Óbeygjanleg orð (53 exercises)
          files: dist/mms_autosolver.exe
          make_latest: true
          prerelease: false
